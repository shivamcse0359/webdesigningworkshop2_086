<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 id="heading">Welcome to My Page</h1>

    <input type="text" id="inputText"
              placeholder="Enter your message">

    <br><br>
    <button id="changeTextBtn">Change Heading</button>
    <button id="bgColorBtn">Change Background</button>
    <button id="fontSizeBtn">Increase font Size</button>
    <button id="toggleParaBtn">Show/Hide Paragraph</button>
    <button id="resetBtn">Reset</button>

    <p id="paragraph">This is a sample paragraph to demonstrate the show/hide functionality.</p>
    <script src="script.js"></script>
</body>
</html>
