<input type="number" id="factNum" placeholder="Enter a number">
<button onclick="calcFactorial()">Calculate Factorial</button>
<p id="result5"></p>

<script>
function calcFactorial() {
    let num = parseInt(document.getElementById("factNum").value);
    let factorial = 1;
    
    for(let i = 1; i <= num; i++) {
        factorial *= i;
    }
    
    document.getElementById("result5").innerText = "Factorial of " + num + " is: " + factorial;
}
</script>
